<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Atlas One – Personal Analytics & Predictive Insights. Intelligent self-understanding through data." />
  <meta name="theme-color" content="#6366f1" />
  <title>Atlas One</title>
  <script>
    // Clear legacy service worker registrations and caches to prevent MIME type asset mismatch loops
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        for (let reg of regs) {
          reg.unregister().then(() => {
            console.log('Unregistered SW registration:', reg.scope);
          });
        }
      });
    }
    if ('caches' in window) {
      caches.keys().then(keys => {
        for (let key of keys) {
          caches.delete(key).then(() => {
            console.log('Purged legacy cache:', key);
          });
        }
      });
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
