<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Atlas One – Personal Analytics & Predictive Insights. Intelligent self-understanding through data." />
    <meta name="theme-color" content="#6366f1" />
    <title>Atlas One</title>
    <script>
      if ('serviceWorker' in navigator) {
        const isLocalhost = window.location.hostname === 'localhost' || 
                            window.location.hostname === '127.0.0.1' || 
                            window.location.hostname === '[::1]';
        if (isLocalhost) {
          navigator.serviceWorker.getRegistrations().then(regs => {
            for (let reg of regs) {
              reg.unregister().then(() => {
                console.log('Unregistered SW on localhost to prevent caching loops');
              });
            }
          });
        } else {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then(reg => console.log('SW registered:', reg.scope))
              .catch(err => console.log('SW registration failed:', err));
          });
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
