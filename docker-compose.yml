version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifeos_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:///./lifeos.db
      SECRET_KEY: super-secret-jwt-key-change-in-production-2026
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lifeos_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

